# ── Memory ────────────────────────────────────────────────────────────────────
# Cap memory usage. Evict least-recently-used keys when the limit is reached.
# Rate-limit buckets and cached PDFs are all ephemeral — LRU is the right
# policy here.
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence ───────────────────────────────────────────────────────────────
# All stored data (rate-limit counters, compiled PDF cache) is reconstructible,
# so disable both RDB snapshots and AOF write-ahead logging.
save ""
appendonly no

# ── Networking ────────────────────────────────────────────────────────────────
# Keep idle connections alive; let the OS close truly dead ones.
timeout 0
tcp-keepalive 300

# Bind on all interfaces so Docker containers can reach this instance.
bind 0.0.0.0

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
