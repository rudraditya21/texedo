services:
  postgres:
    build:
      context: ./db
    container_name: texedo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-texedo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-texedo_password}
      POSTGRES_DB: ${POSTGRES_DB:-texedo_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-texedo} -d $${POSTGRES_DB:-texedo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    build:
      context: ./minio
    container_name: texedo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-texedo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-texedo_minio_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: texedo-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-texedo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-texedo_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-texedo}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set texedo http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing texedo/$${MINIO_BUCKET} &&
        mc anonymous set download texedo/$${MINIO_BUCKET}
    restart: "no"

volumes:
  postgres_data:
  minio_data:
